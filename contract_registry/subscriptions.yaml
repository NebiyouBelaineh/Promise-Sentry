# contract_registry/subscriptions.yaml
# Every inter-system data dependency is listed here.
# A subscription is a consumer's formal declaration of dependency.
# breaking_fields use underscore notation to match ValidationRunner check IDs.

subscriptions:
  - contract_id: week3-document-refinery-extractions
    subscriber_id: week4-cartographer
    subscriber_team: week4
    fields_consumed: [doc_id, extracted_facts, extraction_model]
    breaking_fields:
      - field: extracted_facts_confidence
        reason: used for node ranking; scale change breaks ranking logic
      - field: doc_id
        reason: primary key for node identity in lineage graph
    validation_mode: ENFORCE
    registered_at: '2026-03-10T09:00:00Z'
    contact: week4-team@org.com

  - contract_id: week3-document-refinery-extractions
    subscriber_id: week7-enforcer
    subscriber_team: week7
    fields_consumed: [extracted_facts_confidence, doc_id, extraction_model]
    breaking_fields:
      - field: extracted_facts_confidence
        reason: AI extension embedding drift check baseline
      - field: doc_id
        reason: contract validation primary key
    validation_mode: AUDIT
    registered_at: '2026-03-10T09:00:00Z'
    contact: week7-team@org.com

  - contract_id: week4-brownfield-cartographer-lineage
    subscriber_id: week7-enforcer
    subscriber_team: week7
    fields_consumed: [nodes_node_id, edges_source, edges_target, edges_relationship, snapshot_id, git_commit]
    breaking_fields:
      - field: edges_source
        reason: ViolationAttributor traverses edges for blast radius
      - field: edges_target
        reason: ViolationAttributor traverses edges for blast radius
      - field: nodes_node_id
        reason: used as join key for edge resolution
    validation_mode: ENFORCE
    registered_at: '2026-03-10T09:00:00Z'
    contact: week7-team@org.com

  - contract_id: week5-event-records
    subscriber_id: week7-enforcer
    subscriber_team: week7
    fields_consumed: [event_id, event_type, aggregate_id, payload, metadata, occurred_at, recorded_at]
    breaking_fields:
      - field: event_type
        reason: PascalCase pattern enforced; consumers route on event_type
      - field: payload
        reason: downstream agents parse payload fields by event_type
      - field: occurred_at
        reason: temporal ordering constraint (recorded_at >= occurred_at)
    validation_mode: WARN
    registered_at: '2026-03-10T09:00:00Z'
    contact: week7-team@org.com

  - contract_id: week2-verdict-records
    subscriber_id: week7-enforcer
    subscriber_team: week7
    fields_consumed: [overall_verdict, confidence, scores, evaluated_at]
    breaking_fields:
      - field: overall_verdict
        reason: AI extension output schema violation rate depends on enum values
      - field: confidence
        reason: must remain 0.0-1.0 float range
    validation_mode: AUDIT
    registered_at: '2026-03-10T09:00:00Z'
    contact: week7-team@org.com

  - contract_id: week1-intent-records
    subscriber_id: week7-enforcer
    subscriber_team: week7
    fields_consumed: [intent_id, code_refs_file, code_refs_confidence, created_at]
    breaking_fields:
      - field: code_refs_confidence
        reason: must remain 0.0-1.0 float range
    validation_mode: AUDIT
    registered_at: '2026-03-10T09:00:00Z'
    contact: week7-team@org.com

  - contract_id: week1-intent-records
    subscriber_id: week2-digital-courtroom
    subscriber_team: week2
    fields_consumed: [intent_id, code_refs_file, code_refs_confidence]
    breaking_fields:
      - field: code_refs_file
        reason: verdict target_ref references code_refs.file paths
      - field: intent_id
        reason: primary key for verdict target correlation
    validation_mode: AUDIT
    registered_at: '2026-03-10T09:00:00Z'
    contact: week2-team@org.com

  - contract_id: langsmith-trace-records
    subscriber_id: week7-enforcer
    subscriber_team: week7
    fields_consumed: [id, run_type, total_tokens, prompt_tokens, completion_tokens, total_cost, start_time, end_time]
    breaking_fields:
      - field: total_tokens
        reason: token sum consistency (total_tokens == prompt_tokens + completion_tokens)
      - field: run_type
        reason: AI extension filters traces by run_type enum
      - field: total_cost
        reason: cost must be non-negative for budget tracking
    validation_mode: AUDIT
    registered_at: '2026-03-10T09:00:00Z'
    contact: week7-team@org.com
