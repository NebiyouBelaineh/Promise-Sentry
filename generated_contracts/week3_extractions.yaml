kind: DataContract
apiVersion: v3.0.0
id: week3-document-refinery-extractions
info:
  title: Week 3 — Extractions
  version: 1.0.0
  owner: week3-team
  description: Auto-generated contract for extractions. Each record represents one
    unit of output from the Week 3 system.
servers:
  local:
    type: local
    path: outputs/week3/extractions.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: Confidence fields must remain in 0.0-1.0 float range.
schema:
  doc_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-f-]{36}$
    unique: true
  source_path:
    type: string
    required: true
  source_hash:
    type: string
    required: true
    pattern: ^[a-f0-9]{64}$
    description: SHA-256 hash.
  extraction_model:
    type: string
    required: true
    enum:
    - claude-3-5-sonnet-20241022
  processing_time_ms:
    type: integer
    required: true
    description: ''
    minimum: 0
    _stats:
      observed_mean: 434069.2892
      observed_stddev: 121503.5432
      observed_min: 412.0
      observed_max: 590182.0
  extracted_at:
    type: string
    required: true
    format: date-time
  token_count_input:
    type: integer
    required: true
    description: ''
    minimum: 0
    _stats:
      observed_mean: 55255.0993
      observed_stddev: 13781.2012
      observed_min: 1984.0
      observed_max: 79673.0
  token_count_output:
    type: integer
    required: true
    description: ''
    minimum: 0
    _stats:
      observed_mean: 2867.482
      observed_stddev: 1285.1787
      observed_min: 56.0
      observed_max: 7991.0
  extracted_facts_fact_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-f-]{36}$
    unique: true
  extracted_facts_text:
    type: string
    required: true
  extracted_facts_entity_refs_count:
    type: integer
    required: true
    description: ''
    minimum: 0
    _stats:
      observed_mean: 1.0
      observed_stddev: 0.0
      observed_min: 1.0
      observed_max: 1.0
  extracted_facts_confidence:
    type: number
    required: true
    minimum: 0.0
    maximum: 1.0
    description: Confidence score. Must remain 0.0-1.0 float. BREAKING if changed
      to 0-100.
    _stats:
      observed_mean: 0.8308
      observed_stddev: 0.0477
      observed_min: 0.6718
      observed_max: 1.0
  extracted_facts_page_ref:
    type: integer
    required: true
    description: ''
    minimum: 0
    _stats:
      observed_mean: 78.9609
      observed_stddev: 42.296
      observed_min: 1.0
      observed_max: 162.0
  extracted_facts_source_excerpt:
    type: string
    required: true
quality:
  type: SodaChecks
  specification:
    checks for extractions:
    - missing_count(doc_id) = 0
    - duplicate_count(doc_id) = 0
    - missing_count(source_path) = 0
    - missing_count(source_hash) = 0
    - missing_count(extraction_model) = 0
    - missing_count(processing_time_ms) = 0
    - missing_count(extracted_at) = 0
    - missing_count(token_count_input) = 0
    - missing_count(token_count_output) = 0
    - missing_count(extracted_facts_fact_id) = 0
    - duplicate_count(extracted_facts_fact_id) = 0
    - missing_count(extracted_facts_text) = 0
    - missing_count(extracted_facts_entity_refs_count) = 0
    - missing_count(extracted_facts_confidence) = 0
    - min(extracted_facts_confidence) >= 0.0
    - max(extracted_facts_confidence) <= 1.0
    - missing_count(extracted_facts_page_ref) = 0
    - missing_count(extracted_facts_source_excerpt) = 0
    - row_count >= 1
lineage:
  upstream: []
  downstream: []
