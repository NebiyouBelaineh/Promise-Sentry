    - accepted_values:
        values:
        - '1.0'
        - '0.0'
  - name: payload_total_duration_ms
    tests:
    - dbt_utils.expression_is_true:
        expression: payload_total_duration_ms >= 0
  - name: payload_total_tokens_used
    tests:
    - dbt_utils.expression_is_true:
        expression: payload_total_tokens_used >= 0
  - name: payload_next_agent_triggered
    tests:
    - accepted_values:
        values:
        - credit_analysis
        - fraud_detection
        - compliance
        - decision_orchestrator
  - name: payload_total_nodes_executed
    tests:
    - accepted_values:
        values:
        - '3.0'
        - '7.0'
        - '5.0'
        - '6.0'
