    tests:
    - accepted_values:
        values:
        - pdf
  - name: payload_extraction_model
    tests:
    - accepted_values:
        values:
        - mineru-1.0
  - name: payload_pipeline_version
    tests:
    - accepted_values:
        values:
        - week3-v1.0
  - name: payload_called_at
  - name: payload_tool_name
    tests:
    - accepted_values:
        values:
        - week3_extraction_pipeline
        - query_applicant_registry
  - name: payload_tool_duration_ms
    tests:
    - dbt_utils.expression_is_true:
        expression: payload_tool_duration_ms >= 0
  - name: payload_tool_input_summary
  - name: payload_tool_output_summary
  - name: payload_completed_at
  - name: payload_processing_ms
    tests:
    - dbt_utils.expression_is_true:
        expression: payload_processing_ms >= 0
  - name: payload_raw_text_length
  - name: payload_tables_extracted
    tests:
    - accepted_values:
        values:
        - '4.0'
        - '5.0'
        - '3.0'
        - '2.0'
  - name: payload_assessed_at
  - name: payload_is_coherent
    tests:
    - accepted_values:
        values:
        - 'True'
  - name: payload_auditor_notes
    tests:
    - accepted_values:
        values:
        - Financial statements appear internally consistent. Balance sheet balances.
          Revenue consistent with prior year trajectory.
  - name: payload_overall_confidence
    tests:
    - dbt_utils.expression_is_true:
        expression: payload_overall_confidence >= 0.0 AND payload_overall_confidence
          <= 1.0
  - name: payload_reextraction_recommended
    tests:
    - accepted_values:
        values:
        - 'False'
  - name: payload_ready_at
  - name: payload_has_quality_flags
    tests:
    - accepted_values:
        values:
        - 'False'
  - name: payload_quality_flag_count
    tests:
    - accepted_values:
        values:
        - '0.0'
    - dbt_utils.expression_is_true:
        expression: payload_quality_flag_count >= 0
  - name: payload_documents_processed
    tests:
    - accepted_values:
        values:
        - '3.0'
  - name: payload_written_at
  - name: payload_output_summary
  - name: payload_total_cost_usd
  - name: payload_total_llm_calls
