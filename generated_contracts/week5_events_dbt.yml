  - name: payload_model_deployment_id
  - name: payload_analysis_duration_ms
    tests:
    - dbt_utils.expression_is_true:
        expression: payload_analysis_duration_ms >= 0
  - name: payload_triggered_by_event_id
  - name: payload_initiated_at
