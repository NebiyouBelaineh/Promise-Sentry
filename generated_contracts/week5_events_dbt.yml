version: 2
models:
- name: events
  description: dbt schema for week5-event-records
  columns:
  - name: event_id
    tests:
    - not_null
    - unique
  - name: event_type
    tests:
    - not_null
  - name: aggregate_id
    tests:
    - not_null
    - unique
  - name: aggregate_type
    tests:
    - not_null
  - name: sequence_number
    tests:
    - not_null
  - name: schema_version
    tests:
    - not_null
    - accepted_values:
        values:
        - '1.0'
        - '2.0'
  - name: occurred_at
    tests:
    - not_null
  - name: recorded_at
    tests:
    - not_null
  - name: payload_applicant_id
  - name: payload_contact_name
  - name: payload_loan_purpose
  - name: payload_submitted_at
  - name: payload_contact_email
  - name: payload_application_id
  - name: payload_loan_term_months
    tests:
    - accepted_values:
        values:
        - '24.0'
        - '48.0'
        - '36.0'
        - '60.0'
  - name: payload_submission_channel
    tests:
    - accepted_values:
        values:
        - branch
        - web
        - mobile
        - agent
  - name: payload_requested_amount_usd
  - name: payload_application_reference
  - name: metadata_causation_id
  - name: metadata_correlation_id
  - name: metadata_user_id
    tests:
    - not_null
    - unique
    - accepted_values:
        values:
        - system
  - name: metadata_source_service
    tests:
    - not_null
  - name: payload_deadline
  - name: payload_requested_by
  - name: payload_created_at
  - name: payload_package_id
  - name: payload_filename
  - name: payload_file_hash
    tests:
    - accepted_values:
        values:
        - 8eb66e9cbdaaa5ba
        - d794b166001141a2
        - a86210f5fdceb84f
        - 3a3a2439911766f6
  - name: payload_file_path
  - name: payload_document_id
  - name: payload_fiscal_year
    tests:
    - accepted_values:
        values:
        - '2024.0'
  - name: payload_uploaded_at
  - name: payload_uploaded_by
    tests:
    - accepted_values:
        values:
        - applicant
  - name: payload_document_type
    tests:
    - accepted_values:
        values:
        - application_proposal
        - income_statement
        - balance_sheet
  - name: payload_document_format
    tests:
    - accepted_values:
        values:
        - pdf
        - xlsx
  - name: payload_file_size_bytes
  - name: payload_added_at
  - name: payload_agent_id
    tests:
    - accepted_values:
        values:
        - doc-agent-1
        - credit-agent-1
        - fraud-agent-1
        - compliance-agent-1
        - orchestrator-1
  - name: payload_agent_type
    tests:
    - accepted_values:
        values:
        - document_processing
        - credit_analysis
        - fraud_detection
        - compliance
        - decision_orchestrator
  - name: payload_session_id
  - name: payload_started_at
  - name: payload_model_version
    tests:
    - accepted_values:
        values:
        - claude-sonnet-4-20250514
  - name: payload_context_source
    tests:
    - accepted_values:
        values:
        - fresh
  - name: payload_context_token_count
    tests:
    - dbt_utils.expression_is_true:
        expression: payload_context_token_count >= 0
  - name: payload_langgraph_graph_version
    tests:
    - accepted_values:
        values:
        - 1.0.0-sim
  - name: payload_validated_at
  - name: payload_validation_duration_ms
    tests:
    - dbt_utils.expression_is_true:
        expression: payload_validation_duration_ms >= 0
  - name: payload_node_name
  - name: payload_llm_called
    tests:
    - accepted_values:
        values:
        - 'False'
        - 'True'
  - name: payload_duration_ms
    tests:
    - dbt_utils.expression_is_true:
        expression: payload_duration_ms >= 0
  - name: payload_executed_at
  - name: payload_llm_cost_usd
  - name: payload_node_sequence
  - name: payload_llm_tokens_input
    tests:
    - dbt_utils.expression_is_true:
        expression: payload_llm_tokens_input >= 0
  - name: payload_llm_tokens_output
    tests:
    - dbt_utils.expression_is_true:
        expression: payload_llm_tokens_output >= 0
  - name: payload_page_count
    tests:
    - accepted_values:
        values:
        - '3.0'
        - '5.0'
        - '2.0'
        - '4.0'
    - dbt_utils.expression_is_true:
        expression: payload_page_count >= 0
