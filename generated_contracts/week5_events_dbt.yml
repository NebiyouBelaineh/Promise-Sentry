        values:
        - '6.0'
        - '2.0'
        - '3.0'
  - name: payload_all_analyses_complete
    tests:
    - accepted_values:
        values:
        - 'True'
  - name: payload_confidence
    tests:
    - dbt_utils.expression_is_true:
        expression: payload_confidence >= 0.0 AND payload_confidence <= 1.0
