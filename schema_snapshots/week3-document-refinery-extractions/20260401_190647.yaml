kind: DataContract
apiVersion: v3.0.0
id: week3-document-refinery-extractions
info:
  title: Week 3 — Extractions
  version: 1.0.0
  owner: week3-team
  description: Auto-generated contract for extractions. Each record represents one
    unit of output from the Week 3 system.
servers:
  local:
    type: local
    path: outputs/week3/extractions.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: Confidence fields must remain in 0.0-1.0 float range.
schema:
  doc_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-f-]{36}$
    description: Identifier field (string). Required — must not be null.
    unique: true
  source_path:
    type: string
    required: true
    description: File or resource path. Required — must not be null.
  source_hash:
    type: string
    required: true
    pattern: ^[a-f0-9]{64}$
    description: SHA-256 hash. Changes iff source content changes.
  extraction_model:
    type: string
    required: true
    enum:
    - claude-3-5-sonnet-20241022
    description: Model identifier string. Required — must not be null.
  processing_time_ms:
    type: integer
    required: true
    minimum: 0
    description: 'Processing Time Ms field. Required — must not be null. Observed
      range: [412.00, 590182.00], mean=434069.29.'
  extracted_at:
    type: string
    required: true
    format: date-time
    description: Timestamp in ISO 8601 format. Required — must not be null.
  token_count_input:
    type: integer
    required: true
    minimum: 0
    description: 'Count metric (integer). Required — must not be null. Observed range:
      [1984.00, 79673.00], mean=55255.10.'
  token_count_output:
    type: integer
    required: true
    minimum: 0
    description: 'Count metric (integer). Required — must not be null. Observed range:
      [56.00, 7991.00], mean=2867.48.'
  extracted_facts_fact_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-f-]{36}$
    description: Identifier field (string). Required — must not be null.
    unique: true
  extracted_facts_text:
    type: string
    required: true
    description: Free-text content field. Required — must not be null.
  extracted_facts_entity_refs_count:
    type: integer
    required: true
    minimum: 0
    description: 'Count metric (integer). Required — must not be null. Observed range:
      [1.00, 1.00], mean=1.00.'
  extracted_facts_confidence:
    type: number
    required: true
    minimum: 0.0
    maximum: 1.0
    description: Confidence score. Must remain 0.0-1.0 float. BREAKING if changed
      to 0-100.
  extracted_facts_page_ref:
    type: integer
    required: true
    minimum: 0
    description: 'Extracted Facts Page Ref field. Required — must not be null. Observed
      range: [1.00, 162.00], mean=78.96.'
  extracted_facts_source_excerpt:
    type: string
    required: true
    description: Free-text content field. Required — must not be null.
constraints:
- id: entity_refs_integrity
  type: referential
  rule: extracted_facts[*].entity_refs[] must reference entity_ids in entities[] of
    the same record
  description: Every entity reference in extracted facts must exist in the record's
    entities array.
  severity: CRITICAL
- id: extracted_facts_non_empty
  type: structural
  rule: len(extracted_facts) >= 1
  description: Each extraction record must contain at least one extracted fact.
  severity: HIGH
quality:
  type: SodaChecks
  specification:
    checks for extractions:
    - missing_count(doc_id) = 0
    - duplicate_count(doc_id) = 0
    - missing_count(source_path) = 0
    - missing_count(source_hash) = 0
    - missing_count(extraction_model) = 0
    - missing_count(processing_time_ms) = 0
    - missing_count(extracted_at) = 0
    - missing_count(token_count_input) = 0
    - missing_count(token_count_output) = 0
    - missing_count(extracted_facts_fact_id) = 0
    - duplicate_count(extracted_facts_fact_id) = 0
    - missing_count(extracted_facts_text) = 0
    - missing_count(extracted_facts_entity_refs_count) = 0
    - missing_count(extracted_facts_confidence) = 0
    - min(extracted_facts_confidence) >= 0.0
    - max(extracted_facts_confidence) <= 1.0
    - missing_count(extracted_facts_page_ref) = 0
    - missing_count(extracted_facts_source_excerpt) = 0
    - '# entity_refs_integrity: extracted_facts[*].entity_refs[] must reference entity_ids
      in entities[] of the same record'
    - '# extracted_facts_non_empty: len(extracted_facts) >= 1'
    - row_count >= 1
lineage:
  upstream: []
  downstream: []
