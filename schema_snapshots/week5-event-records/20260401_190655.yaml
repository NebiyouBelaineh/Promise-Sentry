kind: DataContract
apiVersion: v3.0.0
id: week5-event-records
info:
  title: Week 5 — Events
  version: 1.0.0
  owner: week5-team
  description: Auto-generated contract for events. Each record represents one unit
    of output from the Week 5 system.
