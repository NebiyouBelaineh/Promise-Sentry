constraints:
- id: temporal_ordering
  type: cross_column
  rule: recorded_at >= occurred_at
  description: Recording timestamp must be at or after the occurrence timestamp.
  severity: CRITICAL
- id: sequence_monotonicity
  type: cross_column
  rule: sequence_number is monotonically increasing per aggregate_id
  description: Sequence numbers must increase without gaps or duplicates within each
    aggregate.
  severity: CRITICAL
- id: payload_non_empty
  type: structural
  rule: len(payload) >= 1
  description: Event payload must contain at least one field.
  severity: HIGH
quality:
  type: SodaChecks
  specification:
    checks for events:
    - missing_count(event_id) = 0
    - duplicate_count(event_id) = 0
    - missing_count(event_type) = 0
    - missing_count(aggregate_id) = 0
    - duplicate_count(aggregate_id) = 0
    - missing_count(aggregate_type) = 0
    - missing_count(sequence_number) = 0
    - missing_count(schema_version) = 0
    - missing_count(occurred_at) = 0
    - missing_count(recorded_at) = 0
    - missing_count(metadata_correlation_id) = 0
    - duplicate_count(metadata_correlation_id) = 0
    - missing_count(metadata_user_id) = 0
    - duplicate_count(metadata_user_id) = 0
    - missing_count(metadata_source_service) = 0
    - min(payload_overall_confidence) >= 0.0
    - max(payload_overall_confidence) <= 1.0
    - min(payload_confidence) >= 0.0
    - max(payload_confidence) <= 1.0
    - '# temporal_ordering: recorded_at >= occurred_at'
    - '# sequence_monotonicity: sequence_number is monotonically increasing per aggregate_id'
    - '# payload_non_empty: len(payload) >= 1'
    - row_count >= 1
lineage:
  upstream: []
  downstream: []
